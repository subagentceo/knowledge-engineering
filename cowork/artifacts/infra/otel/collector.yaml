receivers:
  otlp:
    protocols:
      http: {endpoint: "0.0.0.0:4318"}
      grpc: {endpoint: "0.0.0.0:4317"}

processors:
  batch: {timeout: 1s}
  memory_limiter: {check_interval: 1s, limit_mib: 256}

exporters:
  debug: {verbosity: detailed}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
