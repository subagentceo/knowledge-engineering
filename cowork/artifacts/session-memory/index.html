<style>
:root{color-scheme:light;--bg:#fbfbfd;--card:#fff;--ink:#1c1c22;--mut:#6b6b78;--line:#e7e7ee;

*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);

.wrap{max-width:960px;margin:0 auto;padding:20px 18px 60px}
header h1{font-size:19px;margin:0 0 2px}header .sub{color:var(--mut);font-size:12.5px;font-family:var(--mono)}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:16px 0}
@media(max-width:680px){.stats{grid-template-columns:repeat(3,1fr)}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
.stat .n{font-size:18px;font-weight:650}.stat .l{color:var(--mut);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px}
.stat.hl{background:linear-gradient(180deg,#f4f2ff,#fff);border-color:#ddd7fb}
.tabs{display:flex;gap:6px;margin:6px 0 14px;border-bottom:1px solid var(--line)}
.tab{padding:7px 12px;cursor:pointer;color:var(--mut);font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:var(--accent);border-color:var(--accent);font-weight:600}
.pane{display:none}.pane.on{display:block}
.turn{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:9px}
.turn .seq{display:inline-block;min-width:26px;height:22px;line-height:22px;text-align:center;background:var(--chip);
border-radius:6px;font-family:var(--mono);font-size:11px;color:var(--mut);margin-right:8px}
.row{display:flex;gap:8px;align-items:flex-start}
.tag{font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;margin-top:1px;white-space:nowrap}
.tag.u{background:#eaf0ff;color:var(--user)}.tag.a{background:#e6f7f1;color:var(--asst)}
.txt{flex:1}.txt .p{font-weight:550}.txt .o{color:#2c2c34;margin-top:3px}
.io{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);display:none}
.turn.open .io{display:block}.toggle{cursor:pointer;color:var(--accent);font-size:11.5px;margin-top:7px;user-select:none}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin:3px 0 7px}
.chip{font-family:var(--mono);font-size:10.5px;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:1px 6px}
.chip.f{background:#f3f7f4;border-color:#dcebe3}.chip.e{background:#fff5ec;border-color:#f4ddc4}
.iolab{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);margin:4px 0 2px}
.tok{float:right;font-family:var(--mono);font-size:10.5px;color:var(--mut)}
pre{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;overflow:auto;
font-family:var(--mono);font-size:11.5px;max-height:420px}
.btn{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer}
.flist{columns:2;column-gap:18px}@media(max-width:680px){.flist{columns:1}}
.flist div{break-inside:avoid;font-family:var(--mono);font-size:11.5px;padding:3px 0;color:#2c2c34}
footer{color:var(--mut);font-size:11.5px;margin-top:18px;font-family:var(--mono)}
</style></head><body><div class="wrap">

<script>
const M=JSON.parse(document.getElementById('mem').textContent);
document.getElementById('title').textContent=M.session.id.split('(')[1].replace(')','');
document.getElementById('sub').textContent=[M.session.surface,M.session.model,M.session.date,M.session.operator].join('  ·  ');
const T=M.totals;
const cards=[['turns',T.turns],['files',T.files_created],['tool kinds',T.tool_kinds],
['e2m tasks',T.e2m_envelopes],['full → mem',T.tokens_full_est.toLocaleString()+' → '+T.tokens_memory_est.toLocaleString()],['compression',T.compression]];
document.getElementById('stats').innerHTML=cards.map((c,i)=>`<div class="stat${i>=4?' hl':''}"><div class="n">${c[1]}</div><div class="l">${c[0]}</div></div>`).join('');
document.getElementById('fc').textContent=T.files_created;
// timeline
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
const tl=M.turns.map(t=>{
 const chips=(arr,cls)=>arr.length?`<div class="chips">${arr.map(x=>`<span class="chip ${cls}">${esc(x)}</span>`).join('')}</div>`:'';
 const io=`<div class="io">
   ${t.io.files.length?'<div class="iolab">files</div>'+chips(t.io.files,'f'):''}
   ${t.io.tools.length?'<div class="iolab">tools</div>'+chips(t.io.tools,''):''}
   ${t.io.envelopes.length?'<div class="iolab">e2m envelopes</div>'+chips(t.io.envelopes,'e'):''}
   ${t.io.queues.length?'<div class="iolab">queues</div>'+chips(t.io.queues,'e'):''}</div>`;
 return `<div class="turn" id="${t.id}">
   <span class="tok">~${t.tokens_est.toLocaleString()} tok</span>
   <div class="row"><span class="seq">${t.seq}</span><span class="tag u">user</span>
     <div class="txt"><div class="p">${esc(t.user.summary)}</div></div></div>
   <div class="row" style="margin-top:6px"><span class="seq" style="visibility:hidden"></span><span class="tag a">asst</span>
     <div class="txt"><div class="o">${esc(t.assistant.summary)}</div></div></div>
   <div class="toggle" onclick="this.closest('.turn').classList.toggle('open')">structured I/O ▾</div>${io}</div>`;
}).join('');
document.getElementById('timeline').innerHTML=tl;
// files
const files=[...new Set(M.turns.flatMap(t=>t.io.files).filter(f=>!f.includes('<16')))].sort();
document.getElementById('flist').innerHTML=files.map(f=>`<div>${esc(f)}</div>`).join('');
// resume payload (compact)
const resume={_type:'session_resume',schema:M.schema,session:M.session,totals:T,
 turns:M.turns.map(t=>({seq:t.seq,user:t.user.summary,did:t.assistant.summary,files:t.io.files.length}))};
const rj=JSON.stringify(resume,null,1);
document.getElementById('rpre').textContent=rj;
document.getElementById('copy').onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(rj);
 document.getElementById('copy').textContent='Copied ✓';setTimeout(()=>document.getElementById('copy').textContent='Copy resume payload',1400)};
document.getElementById('foot').textContent='schema: '+M.schema+'  ·  memory store = curated episode index (dreams-style), '+T.compression+' vs full transcript  ·  self-contained, 0 tokens to view';
// tabs
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
 document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));document.getElementById(t.dataset.p).classList.add('on');});
