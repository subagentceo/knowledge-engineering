# yaml-language-server: $schema=../../../schemas/table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: AlloyDbTableSemantics
table_kind: events
grain: one row per memory read event (csl_id × agent_id × occurred_at)

metadata:
  name: events_memory_access
  labels:
    lane: citation-memory
    source: src/lib/memory-access-log.ts

spec:
  version: 1.0.0
  schema: dw
  codeowners:
    - subagentceo
    - alex@opensubagents.com
  sla_policy: append at read time; never mutated
  data_start_date: "2026-06-12"
  allowed_operations:
    - read
    - append
  description: >-
    Raw append-only stream of research-agent memory reads, the events_
    counterpart of fact_memory_access (which stays the dreams job's
    aggregated input). One row per read regardless of whether a current
    dim_memory row matched — unmatched reads are the demand signal for
    memories that do not exist yet.
  load_type: append_only
  columns:
    - name: csl_id
      kind: dimension
      sql_type: text
      description: requested citation id (memory natural key source)
    - name: agent_id
      kind: dimension
      sql_type: text
      description: reading agent (session or coworker id)
    - name: matched
      kind: dimension
      sql_type: boolean
      description: whether a current dim_memory row existed at read time
    - name: occurred_at
      kind: time_dimension
      sql_type: timestamptz
      description: read wall-clock time
