# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: compliance

metadata:
  name: project_document_metadata
  labels:
    connector: compliance

spec:
  version: 1.0.0
  schema: claude_ai
  grain: "one row per project document file"
  primary_key: [id, claude_project_id, project_attachment_id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: id
      kind: dimension
      sql_type: text
    - name: claude_project_id
      kind: dimension
      sql_type: text
    - name: project_attachment_id
      kind: dimension
      sql_type: text
    - name: user_id
      kind: dimension
      sql_type: text
    - name: created_at
      kind: time_dimension
      sql_type: timestamptz
    - name: filename
      kind: dimension
      sql_type: text
    - name: md_5
      kind: dimension
      sql_type: text
    - name: mime_type
      kind: dimension
      sql_type: text
    - name: size_bytes
      kind: measure
      sql_type: bigint
  ddl: |
    CREATE TABLE IF NOT EXISTS claude_ai.project_document_metadata (
        id TEXT NOT NULL,
        claude_project_id TEXT NOT NULL,
        project_attachment_id TEXT NOT NULL,
        user_id TEXT,
        created_at TIMESTAMPTZ,
        filename TEXT,
        md_5 TEXT,
        mime_type TEXT,
        size_bytes BIGINT,
        PRIMARY KEY (id, claude_project_id, project_attachment_id)
    );

# @cite Fivetran ERD: Claude Compliance (claude.ai export)
# @cite uploads/Claude Compliance_diagram.pdf
