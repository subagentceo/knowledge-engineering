# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: compliance

metadata:
  name: chat_message
  labels:
    connector: compliance

spec:
  version: 1.0.0
  schema: claude_ai
  grain: "one row per chat message"
  primary_key: [id, chat_id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: id
      kind: dimension
      sql_type: text
    - name: chat_id
      kind: dimension
      sql_type: text
    - name: created_at
      kind: time_dimension
      sql_type: timestamptz
    - name: role
      kind: dimension
      sql_type: text
    - name: updated_at
      kind: time_dimension
      sql_type: timestamptz
  ddl: |
    CREATE TABLE IF NOT EXISTS claude_ai.chat_message (
        id TEXT NOT NULL,
        chat_id TEXT NOT NULL,
        created_at TIMESTAMPTZ,
        role TEXT,
        updated_at TIMESTAMPTZ,
        PRIMARY KEY (id, chat_id)
    );

# @cite Fivetran ERD: Claude Compliance (claude.ai export)
