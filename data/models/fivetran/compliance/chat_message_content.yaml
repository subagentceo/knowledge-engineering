# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: compliance

metadata:
  name: chat_message_content
  labels:
    connector: compliance

spec:
  version: 1.0.0
  schema: claude_ai
  grain: "one row per message content block"
  primary_key: [index, chat_id, chat_message_id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: index
      kind: dimension
      sql_type: bigint
    - name: chat_id
      kind: dimension
      sql_type: text
    - name: chat_message_id
      kind: dimension
      sql_type: text
    - name: text
      kind: dimension
      sql_type: text
    - name: type
      kind: dimension
      sql_type: text
  ddl: |
    CREATE TABLE IF NOT EXISTS claude_ai.chat_message_content (
        index BIGINT NOT NULL,
        chat_id TEXT NOT NULL,
        chat_message_id TEXT NOT NULL,
        text TEXT,
        type TEXT,
        PRIMARY KEY (index, chat_id, chat_message_id)
    );

