# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: compliance

metadata:
  name: compliance_role
  labels:
    connector: compliance

spec:
  version: 1.0.0
  schema: claude_ai
  grain: "one row per compliance role"
  primary_key: [id, organization_uuid]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: id
      kind: dimension
      sql_type: text
    - name: organization_uuid
      kind: dimension
      sql_type: text
    - name: created_at
      kind: time_dimension
      sql_type: timestamptz
    - name: description
      kind: dimension
      sql_type: text
    - name: name
      kind: dimension
      sql_type: text
    - name: updated_at
      kind: time_dimension
      sql_type: timestamptz
  ddl: |
    CREATE TABLE IF NOT EXISTS claude_ai.compliance_role (
        id TEXT NOT NULL,
        organization_uuid TEXT NOT NULL,
        created_at TIMESTAMPTZ,
        description TEXT,
        name TEXT,
        updated_at TIMESTAMPTZ,
        PRIMARY KEY (id, organization_uuid)
    );

# @cite Fivetran ERD: Claude Compliance (claude.ai export)
# @cite uploads/Claude Compliance_diagram.pdf
