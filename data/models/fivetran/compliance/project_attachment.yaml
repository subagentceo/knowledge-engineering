# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: compliance

metadata:
  name: project_attachment
  labels:
    connector: compliance

spec:
  version: 1.0.0
  schema: claude_ai
  grain: "one row per project attachment"
  primary_key: [id, project_id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: id
      kind: dimension
      sql_type: text
    - name: project_id
      kind: dimension
      sql_type: text
  ddl: |
    CREATE TABLE IF NOT EXISTS claude_ai.project_attachment (
        id TEXT NOT NULL,
        project_id TEXT NOT NULL,
        PRIMARY KEY (id, project_id)
    );

