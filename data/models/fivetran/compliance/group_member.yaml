# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: compliance

metadata:
  name: group_member
  labels:
    connector: compliance

spec:
  version: 1.0.0
  schema: claude_ai
  grain: "one row per (group, user) membership"
  primary_key: [group_id, user_id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: group_id
      kind: dimension
      sql_type: text
    - name: user_id
      kind: dimension
      sql_type: text
    - name: created_at
      kind: time_dimension
      sql_type: timestamptz
    - name: email
      kind: dimension
      sql_type: text
    - name: updated_at
      kind: time_dimension
      sql_type: timestamptz
  ddl: |
    CREATE TABLE IF NOT EXISTS claude_ai.group_member (
        group_id TEXT NOT NULL,
        user_id TEXT NOT NULL,
        created_at TIMESTAMPTZ,
        email TEXT,
        updated_at TIMESTAMPTZ,
        PRIMARY KEY (group_id, user_id)
    );

# @cite Fivetran ERD: Claude Compliance (claude.ai export)
# @cite uploads/Claude Compliance_diagram.pdf
