# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: entity

metadata:
  name: api_key
  labels:
    connector: platform

spec:
  version: 1.0.0
  schema: anthropic_claude
  grain: "one row per API key"
  primary_key: [id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: id
      kind: dimension
      sql_type: text
    - name: workspace_id
      kind: dimension
      sql_type: text
    - name: created_at
      kind: time_dimension
      sql_type: timestamptz
    - name: created_by_id
      kind: dimension
      sql_type: text
    - name: created_by_type
      kind: dimension
      sql_type: text
    - name: name
      kind: dimension
      sql_type: text
    - name: partial_key_hint
      kind: dimension
      sql_type: text
    - name: status
      kind: dimension
      sql_type: text
    - name: type
      kind: dimension
      sql_type: text
  ddl: |
    CREATE TABLE IF NOT EXISTS anthropic_claude.api_key (
        id TEXT PRIMARY KEY,
        workspace_id TEXT,
        created_at TIMESTAMPTZ,
        created_by_id TEXT,
        created_by_type TEXT,
        name TEXT,
        partial_key_hint TEXT,
        status TEXT,
        type TEXT
    );

# @cite Fivetran ERD: Claude Platform (Admin/API)
# @cite uploads/Claude Platform_diagram.pdf
# @cite https://fivetran.com/docs/connectors/applications/claude-platform/api-configuration
