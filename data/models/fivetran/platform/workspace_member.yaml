# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: entity

metadata:
  name: workspace_member
  labels:
    connector: platform

spec:
  version: 1.0.0
  schema: anthropic_claude
  grain: "one row per (user, workspace)"
  primary_key: [user_id, workspace_id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: user_id
      kind: dimension
      sql_type: text
    - name: workspace_id
      kind: dimension
      sql_type: text
    - name: type
      kind: dimension
      sql_type: text
    - name: workspace_role
      kind: dimension
      sql_type: text
  ddl: |
    CREATE TABLE IF NOT EXISTS anthropic_claude.workspace_member (
        user_id TEXT NOT NULL,
        workspace_id TEXT NOT NULL,
        type TEXT,
        workspace_role TEXT,
        PRIMARY KEY (user_id, workspace_id)
    );

