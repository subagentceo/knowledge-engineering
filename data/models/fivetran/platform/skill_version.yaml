# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: entity

metadata:
  name: skill_version
  labels:
    connector: platform

spec:
  version: 1.0.0
  schema: anthropic_claude
  grain: "one row per skill version"
  primary_key: [id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: id
      kind: dimension
      sql_type: text
    - name: skill_id
      kind: dimension
      sql_type: text
    - name: created_at
      kind: time_dimension
      sql_type: timestamptz
    - name: description
      kind: dimension
      sql_type: text
    - name: directory
      kind: dimension
      sql_type: text
    - name: name
      kind: dimension
      sql_type: text
    - name: type
      kind: dimension
      sql_type: text
    - name: version
      kind: dimension
      sql_type: text
  ddl: |
    CREATE TABLE IF NOT EXISTS anthropic_claude.skill_version (
        id TEXT PRIMARY KEY,
        skill_id TEXT,
        created_at TIMESTAMPTZ,
        description TEXT,
        directory TEXT,
        name TEXT,
        type TEXT,
        version TEXT
    );

# @cite Fivetran ERD: Claude Platform (Admin/API)
# @cite uploads/Claude Platform_diagram.pdf
# @cite https://fivetran.com/docs/connectors/applications/claude-platform/api-configuration
