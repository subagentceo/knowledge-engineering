# yaml-language-server: $schema=../../../../schemas/fivetran-table-semantics.schema.json
---
apiVersion: anthropic.com/v1
kind: FivetranTableSemantics
table_kind: entity

metadata:
  name: invite
  labels:
    connector: platform

spec:
  version: 1.0.0
  schema: anthropic_claude
  grain: "one row per org invite"
  primary_key: [id]
  load_type: incremental
  codeowners:
    - data-coworker
  columns:
    - name: id
      kind: dimension
      sql_type: text
    - name: email
      kind: dimension
      sql_type: text
    - name: expires_at
      kind: time_dimension
      sql_type: timestamptz
    - name: invited_at
      kind: time_dimension
      sql_type: timestamptz
    - name: role
      kind: dimension
      sql_type: text
    - name: status
      kind: dimension
      sql_type: text
    - name: type
      kind: dimension
      sql_type: text
  ddl: |
    CREATE TABLE IF NOT EXISTS anthropic_claude.invite (
        id TEXT PRIMARY KEY,
        email TEXT,
        expires_at TIMESTAMPTZ,
        invited_at TIMESTAMPTZ,
        role TEXT,
        status TEXT,
        type TEXT
    );

# @cite Fivetran ERD: Claude Platform (Admin/API)
# @cite uploads/Claude Platform_diagram.pdf
# @cite https://fivetran.com/docs/connectors/applications/claude-platform/api-configuration
