# .github/workflows/claude.yml
#
# Responds to @claude mentions in issues, PR review comments, and PR
# reviews. Pairs with .claude/skills/heartbeat.md: the heartbeat
# orchestrator (in-session) and Claude Code Action (in-CI) coordinate
# via PR-activity events. The heartbeat can dispatch fixes by posting
# an @claude comment with a directive; Claude in CI executes the
# directive on the head SHA.
#
# Refactored 2026-05-18 (OAUTO13). Same cross-reference set as
# claude-code-review.yml (claude-code-action README + action.yml +
# docs/{usage,setup,security,configuration}.md, code-review plugin
# README, marketplace listing).
#
# Refactor changelog vs prior version:
#
#   1. contents: read → write    permissions
#      pull-requests: read → write
#      issues: read → write
#      Per docs/configuration.md: "Standard permissions (contents: write,
#      pull_requests: write, issues: write) are always included" for
#      interactive @claude flows. The action needs write to push branches,
#      create PRs, update issues. Prior config caused opaque mid-flow
#      failures.
#
#      Note: write perms on `issue_comment`/`issues` event handlers are
#      LOWER risk than on `pull_request` because the trigger is gated by:
#        (a) the @claude-mention filter in the `if:` block below
#        (b) the action's native writer-permission check (per docs/security.md:
#            "the action can only be triggered by users with write access to
#            the repository")
#
#   2. Added: claude_args: --model claude-sonnet-4-6
#      Per operator directive 2026-05-18, prefer Sonnet 4.6 over Opus 4.7
#      for the @claude responder for speed/cost. Note: "fast mode" is an
#      Opus-only concept per claude-code CHANGELOG 2026-w17; the
#      directive here resolves to model class selection (Sonnet).
#
#   3. Removed: commented-out boilerplate template lines (prior comments
#      pointed at upstream docs; in-file noise was stale).
#
# Security posture (cited from docs/security.md):
#   - Trigger is gated by @claude mention AND writer permission. External
#     users cannot invoke (the action enforces write-perm check natively).
#   - allowed_bots is UNSET → bots cannot trigger. If we add heartbeat-
#     dispatched bot comments later, use explicit list ('github-actions[bot]'),
#     NEVER '*' (public repo invocation risk).
#   - No `pull_request_target` / `workflow_run` triggers — these run with
#     base secrets + untrusted ref and are a known pwn-request surface.
#   - ANTHROPIC_API_KEY is FORBIDDEN per ADR OSEC1 — only OAuth token.
#   - additional_permissions: actions:read lets Claude read CI logs to
#     diagnose breakages — load-bearing for the heartbeat fix-dispatch
#     flow; safe because it's read-only.
#
# Command-injection note: GitHub event variables (github.event.comment.body
# etc.) are used ONLY inside contains() boolean tests in the `if:` filter.
# They are never interpolated into a `run:` shell. Safe per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.event.review.id }}
  cancel-in-progress: false  # interactive flows must not be cut mid-thought

jobs:
  claude:
    # O-CICD1 kill switch: paused org-wide unless the org/repo variable
    # CLAUDE_CICD_ENABLED is explicitly set to 'true'. Unset (default) =
    # Claude never runs in CI. Re-enable for the whole org by setting the
    # org-level Actions variable; re-enable one repo by setting it at repo
    # scope. Removing this line restores prior always-on behavior.
    if: |
      vars.CLAUDE_CICD_ENABLED == 'true' && (
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) )

    runs-on: ubuntu-latest
    # OGHW5: bounded timeout. @claude flows can run long (multi-turn
    # agent loops), but 30min is the operator's chosen ceiling.
    # Beyond that, Claude returns an in-progress comment so the next
    # tick can continue from a session resume.
    timeout-minutes: 30
    permissions:
      contents: write         # push branches Claude creates
      pull-requests: write    # PR create + comment
      issues: write           # issue update + label
      id-token: write
      actions: read           # required for Claude to read CI results

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          # OGHW5: NOT setting persist-credentials: false here. Unlike
          # claude-code-review.yml (which only posts inline comments
          # via the API), this workflow's action creates branches and
          # pushes commits — it relies on the GITHUB_TOKEN persisted
          # in git config by checkout. The token's scope is bounded
          # by the permissions: block above.

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1  # marketplace: claude-code-action-official
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Sonnet 4.6 per operator directive 2026-05-18.
          claude_args: |
            --model claude-sonnet-4-6

          additional_permissions: |
            actions: read
