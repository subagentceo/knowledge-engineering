# .github/workflows/neon-branch.yml
#
# Canonical workflow from the Neon GitHub integration setup wizard,
# layered with our operator discipline. Operator completed the Neon ↔
# GitHub project link for `divine-cloud-27295848`; secrets +
# variables are now provisioned:
#
#   secrets.NEON_API_KEY    (auto-set by Neon integration)
#   vars.NEON_PROJECT_ID    (= divine-cloud-27295848)
#
# Replaces the scaffold version that gated on `vars.NEON_PROJECT_ID != ''`
# (no longer needed; the var is set).
#
# Cited from:
#   seeds/prompts/operator-2026-05-10-followup.md (Full-Stack Cloud Agent)
#   seeds/prompts/operator-2026-05-10-autonomy.md (GitHub workflows as primitives)
#   docs/governance.md
#   docs/phase-gates.md (Phase 8 operator-gating)
#
# Per-PR: creates a Neon database branch on open/sync/reopen, names it
# preview/pr-<N>-<branch-slug>, sets a 14-day expiry, posts the branch
# info on the PR; deletes on close. Branch URLs (pooled + unpooled) are
# emitted as job outputs for downstream steps (migrations, schema-diff).

name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review   # fire the create-branch step when a draft is promoted
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v9

  create_neon_branch:
    name: Create Neon Branch
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
    needs: setup
    # Skip draft PRs. ready_for_review (in types: above) fires the create
    # path when the PR is promoted. The delete_neon_branch job is NOT
    # draft-gated — `closed` of a draft must still clean up if a branch
    # was created before the draft toggle.
    # OPM4: gate on vars.NEON_ENABLED so the job SKIPS cleanly (not fails)
    # when the Neon budget is exhausted. The 2026-05-29 train saw this job
    # fail red on every PR after budget ran out — misleading, since it is
    # not a required check. Set repo/org variable NEON_ENABLED=true to
    # re-enable once budget is restored.
    if: |
      vars.NEON_ENABLED == 'true'
      && github.event_name == 'pull_request'
      && github.event.pull_request.draft == false
      && (
        github.event.action == 'synchronize'
        || github.event.action == 'opened'
        || github.event.action == 'reopened'
        || github.event.action == 'ready_for_review'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Create Neon Branch
        id: create_neon_branch
        # OGHW-X2: SHA-pinned per docs/decisions/2026-05-18-actions-sha-pinning.md.
        uses: neondatabase/create-branch-action@fb620d43d4c565abaf088b848a4e28e5c4ea4d9c  # v6.3.1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

      # Surface the branch name in a PR comment so the heartbeat
      # orchestrator (and humans) can see what was provisioned. Important:
      # never log db_url / db_url_with_pooler — they contain credentials.
      - name: Comment branch info on PR
        uses: actions/github-script@v9
        with:
          script: |
            const branchName = `preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `Neon branch ready: \`${branchName}\``,
                ``,
                `Connection strings (pooled + unpooled) are emitted as job outputs for downstream steps. They are NOT printed in the workflow log — see Neon Console (project: divine-cloud-27295848) if you need to inspect them.`
              ].join('\n')
            });

      # Phase 13.B+ (O8): apply migrations/ to the freshly-created branch.
      # Idempotent — each migration uses IF NOT EXISTS guards so re-run
      # against an existing branch is safe.
      - name: Checkout repo (needed for migrations/ + scripts/)
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --prefer-offline --no-audit

      # Diagnostic: confirm the create-branch action populated db_url_with_pooler.
      # Logs only length + presence — never the value (it's a credential).
      # If this step fails, the env-var threading is broken regardless of v5/v6.
      - name: Verify NEON_DATABASE_URL is populated
        run: |
          if [ -z "$NEON_DATABASE_URL" ]; then
            echo "::error::NEON_DATABASE_URL is empty — db_url_with_pooler did not thread from create_neon_branch step. Action version may be writing outputs via the deprecated ::set-output protocol, or the output name differs from what v5/v6 docs claim."
            exit 1
          fi
          echo "NEON_DATABASE_URL is set (length=${#NEON_DATABASE_URL})"
        env:
          NEON_DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"

      - name: Run Migrations
        run: npx tsx scripts/migrate-neon.ts
        env:
          NEON_DATABASE_URL: "${{ steps.create_neon_branch.outputs.db_url_with_pooler }}"

      # Schema diff (informational; surfaces drift between PR branch and main).
      - name: Post Schema Diff Comment to PR
        # OGHW-X2: SHA-pinned per docs/decisions/2026-05-18-actions-sha-pinning.md.
        uses: neondatabase/schema-diff-action@80cfa8521628e890015b60f5291a7738926617dc  # v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: setup
    # OPM4: same NEON_ENABLED gate as create_neon_branch.
    if: vars.NEON_ENABLED == 'true' && github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete Neon Branch
        # OGHW-X2: SHA-pinned per docs/decisions/2026-05-18-actions-sha-pinning.md.
        uses: neondatabase/delete-branch-action@4468d825d5a88ef4012f1705a82f02ec3072f776  # v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
