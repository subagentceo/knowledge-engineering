# auto-rebase — rebase open automerge PRs and rescue BLOCKED-without-checks PRs.
#
# Triggers (defense in depth — see ORC4):
#   1. workflow_run: when auto-merge.yml completes (fires even for
#      GITHUB_TOKEN-triggered events; on:push did NOT, because GitHub
#      suppresses workflows triggered by github-actions to prevent
#      recursion).
#   2. schedule: every 10 min as a backstop.
#   3. workflow_dispatch: manual kick.
#   4. push: human-actor pushes to main still fire workflows.
#
# Two jobs (OGHW3 + OAUTO16):
#   - rebase-behind-prs: the original OAUTO12 path. Rebases BEHIND PRs
#     and redispatches verify+osv against the rebased branch (post
#     anti-recursion-suppressed push).
#   - rescue-blocked-prs: the new OAUTO16 path. Scans for PRs whose
#     current head is missing one or both required check contexts
#     (typically because a previous MCP-driven update-branch was
#     GitHub-App-authored and got anti-recursion-suppressed) and
#     dispatches verify+osv against them. Without this, a PR can sit
#     in BLOCKED forever after a non-cron rebase.
#
# Cited from:
#   docs/decisions/2026-05-17-auto-merge-recovery.md (OAUTO12)
#   docs/decisions/2026-05-18-actions-sha-pinning.md (no SHA-pins here;
#     `gh` is provided by the runner image, not via uses:)

name: auto-rebase

on:
  workflow_run:
    workflows: [auto-merge]
    types: [completed]
  schedule:
    - cron: '*/10 * * * *'
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write   # required for `gh workflow run` (workflow_dispatch)

# Serialize globally so two cron ticks don't race on the same PR.
concurrency:
  group: auto-rebase-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  rebase-behind-prs:
    # Only run on merged PRs, not closed-without-merge.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    name: Rebase BEHIND automerge PRs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # OAUTO19: prefer AUTO_REBASE_PAT (a PAT with contents:write +
      # pull-requests:write) so `gh pr update-branch` push fires
      # pull_request events naturally — branch-guard, verify, and
      # OSV-Scanner (PR) run on the rebased SHA without needing
      # workflow_dispatch fallback. Falls back to GITHUB_TOKEN if
      # the PAT is unavailable.
      GH_TOKEN: ${{ secrets.AUTO_REBASE_PAT || secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Rebase every open automerge PR that is BEHIND
        run: |
          set -euo pipefail
          echo "Listing open non-draft PRs with the automerge label..."
          mapfile -t PRS < <(gh pr list \
            --state open \
            --label automerge \
            --json number,isDraft,mergeStateStatus \
            -q '.[] | select(.isDraft==false) | select(.mergeStateStatus=="BEHIND") | .number')

          if [ "${#PRS[@]}" -eq 0 ]; then
            echo "No BEHIND PRs need rebasing."
            exit 0
          fi

          echo "Found ${#PRS[@]} BEHIND PR(s): ${PRS[*]}"
          fail_count=0
          for n in "${PRS[@]}"; do
            echo "::group::Rebase PR #$n"
            if gh pr update-branch "$n"; then
              echo "rebased #$n"
              # ORC7 / OAUTO12: GITHUB_TOKEN-triggered push from update-branch
              # does NOT fire downstream workflows (GitHub anti-recursion).
              # Explicitly dispatch the required-status-check workflows on
              # the rebased branch so the gate can re-satisfy on the new SHA.
              # See docs/decisions/2026-05-17-auto-merge-recovery.md
              branch=$(gh pr view "$n" --json headRefName -q .headRefName)
              gh workflow run verify.yml      --ref "$branch" || echo "::warning::verify dispatch failed for #$n on $branch"
              gh workflow run osv-scanner.yml --ref "$branch" || echo "::warning::osv dispatch failed for #$n on $branch"
            else
              echo "::warning::could not rebase #$n (likely conflict)"
              fail_count=$((fail_count+1))
            fi
            echo "::endgroup::"
          done

          echo "Done. Rebase failures: $fail_count (left BEHIND for human review)."

  rescue-blocked-prs:
    # Only run on merged PRs, not closed-without-merge.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    name: Rescue BLOCKED automerge PRs missing required checks (OAUTO16)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.AUTO_REBASE_PAT || secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Find BLOCKED PRs whose head is missing verify or osv
        run: |
          set -euo pipefail
          # The two required-status-check contexts from the branch ruleset.
          # MUST stay in sync with scripts/setup-branch-protection.ts.
          REQUIRED_VERIFY="npm run verify"
          REQUIRED_OSV="OSV-Scanner (PR) / osv-scan"

          echo "Listing open non-draft BLOCKED automerge PRs..."
          mapfile -t PRS < <(gh pr list \
            --state open \
            --label automerge \
            --json number,isDraft,mergeStateStatus \
            -q '.[] | select(.isDraft==false) | select(.mergeStateStatus=="BLOCKED") | .number')

          if [ "${#PRS[@]}" -eq 0 ]; then
            echo "No BLOCKED PRs to rescue."
            exit 0
          fi

          rescued=0
          for n in "${PRS[@]}"; do
            echo "::group::Inspect BLOCKED PR #$n"
            branch=$(gh pr view "$n" --json headRefName -q .headRefName)
            head_sha=$(gh pr view "$n" --json headRefOid -q .headRefOid)

            # Fetch check-run names on the current head SHA.
            # `--paginate` ensures we don't miss any in big repos.
            checks=$(gh api --paginate "repos/$GH_REPO/commits/$head_sha/check-runs" \
              -q '.check_runs[].name' 2>/dev/null || echo "")

            missing_verify=0
            missing_osv=0
            grep -Fxq "$REQUIRED_VERIFY" <<<"$checks" || missing_verify=1
            grep -Fxq "$REQUIRED_OSV"    <<<"$checks" || missing_osv=1

            if [ "$missing_verify" -eq 0 ] && [ "$missing_osv" -eq 0 ]; then
              # Both required checks are present on this SHA (may still be
              # in_progress). The PR is blocked only while checks run — once
              # they pass, auto-merge will fire. Nothing to rescue here.
              # (OAUTO18: removed branch-guard reopen loop — GITHUB_TOKEN
              # close/reopen suppresses pull_request events so branch-guard
              # could never fire, causing an infinite rescue cycle.)
              echo "#$n: both required checks present; BLOCKED is transient (checks running or other reason). Skipping."
              echo "::endgroup::"
              continue
            fi

            echo "#$n missing checks (verify=$missing_verify osv=$missing_osv). Dispatching against branch $branch..."
            if [ "$missing_verify" -ne 0 ]; then
              gh workflow run verify.yml --ref "$branch" || echo "::warning::verify dispatch failed for #$n on $branch"
            fi
            if [ "$missing_osv" -ne 0 ]; then
              gh workflow run osv-scanner.yml --ref "$branch" || echo "::warning::osv dispatch failed for #$n on $branch"
            fi
            rescued=$((rescued+1))
            echo "::endgroup::"
          done

          echo "Rescued $rescued BLOCKED PR(s)."
