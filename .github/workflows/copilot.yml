# .github/workflows/copilot.yml
#
# GitHub Copilot Autofix support. Conditional on the repo variable
# vars.COPILOT_ENABLED == 'true'. Inert when Copilot is not enabled,
# so committing this file is safe whether or not the operator has
# Copilot turned on.
#
# Cited from seeds/prompts/operator-2026-05-10-autonomy.md ("GitHub
# Copilot workflow actions if copilot is enabled").
#
# Two surfaces:
#   1. Autofix on code-scanning alerts (suggest fixes for CodeQL +
#      OSV-Scanner findings from osv-scanner.yml).
#   2. Issue → branch + draft PR (when the heartbeat assigns Copilot as
#      an alternate fixer for tractable, non-architectural issues).

name: copilot

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches: [main]
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: write

jobs:
  autofix:
    if: vars.COPILOT_ENABLED == 'true' && github.event_name == 'pull_request_target'
    name: Copilot Autofix (suggest fixes)
    runs-on: ubuntu-latest
    steps:
      - name: Comment Copilot autofix instructions
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                'Copilot Autofix is enabled. When code-scanning alerts (OSV-Scanner, CodeQL) attach to this PR, suggested fixes will surface under the **Security** tab.',
                '',
                'Per `seeds/prompts/operator-2026-05-10-autonomy.md`, the heartbeat orchestrator can adopt a Copilot suggestion as its push when:',
                '- the suggestion is a one-file diff, AND',
                '- the rubric for the affected phase already covers the change scope, AND',
                '- `npm run verify` passes locally on the suggested patch.',
                '',
                'Otherwise the heartbeat posts a question to this PR instead of pushing.'
              ].join('\n')
            });

  copilot-issue-handoff:
    if: vars.COPILOT_ENABLED == 'true' && github.event_name == 'issues' && github.event.label.name == 'copilot-please'
    name: Hand off issue to Copilot
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge handoff
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Issue labeled `copilot-please`. Per operator autonomy directive, this issue is now eligible for Copilot to open a draft PR. The heartbeat will reconcile against the relevant `rubrics/phase-*.md` once Copilot's PR opens.'
            });
