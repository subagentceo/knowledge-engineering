# .github/workflows/claude-code-review.yml
#
# Canonical anthropics/claude-code-action template. Merged via PR #17
# (operator added via the GitHub setup wizard). Integrated into the
# operator-stated discipline; see seeds/prompts/operator-2026-05-10-autonomy.md
# and docs/governance.md.
#
# Auto-reviews every PR via the code-review plugin from
# anthropics/claude-code-plugins. This is the **automated reviewer**
# that operationalizes "remove operator from PR-review HITL": Claude
# posts review comments, the operator does not. Combined with
# .github/workflows/auto-merge.yml + branch protection, the human PR
# review step is eliminated for the no-HITL loop.
#
# OAuth-only: uses secrets.CLAUDE_CODE_OAUTH_TOKEN. Same token as
# infra/cloudflare/src/worker.ts (Phase 8 cloud-agent runner).

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # OAUTO1: skip docs/vendor-only PRs — reviewing a 600-page crawled
    # mirror or pure-prose ADR has no source code to review and wastes
    # Claude Code SDK quota.
    paths-ignore:
      - "vendor/**"
      - "docs/**"
      - "**.md"
      - "**.mdx"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # OAUTO1 (2026-05-17): tolerate Anthropic-org "Claude Code SDK access
    # disabled" failures (see docs/followups/2026-05-17-merge-velocity-audit.md
    # finding #1). Operator must enable SDK access at console.anthropic.com
    # for this check to actually run. Until then, continue-on-error keeps
    # the PR checks UI honest: a yellow warning, not a red ✗.
    continue-on-error: true
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

