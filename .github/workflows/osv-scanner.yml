# .github/workflows/osv-scanner.yml
#
# OSV-Scanner (Google) against the npm lockfile + infra/cloudflare's
# package.json. Catches advisories from GHSA, npm, PyPI, RustSec, Go
# vulndb, OSS-Fuzz. Cited from:
#   https://osv.dev/
#   https://google.github.io/osv-scanner/
#   https://github.com/google/osv-scanner
#
# Runs on every PR + weekly on a schedule. Findings are uploaded to
# GitHub's code-scanning UI via SARIF when on push to main.

name: osv-scanner

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # to upload SARIF on main pushes
  actions: read

concurrency:
  group: osv-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-pr:
    if: github.event_name == 'pull_request'
    name: OSV-Scanner (PR)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.0.0
    with:
      scan-args: |-
        --recursive
        --skip-git
        --lockfile=./package-lock.json
        --lockfile=./infra/cloudflare/package.json
        ./

  scan-main:
    if: github.event_name != 'pull_request'
    name: OSV-Scanner (push / schedule)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.0.0
    with:
      scan-args: |-
        --recursive
        --skip-git
        --lockfile=./package-lock.json
        --lockfile=./infra/cloudflare/package.json
        ./
