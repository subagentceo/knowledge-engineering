# agent-cost-gate.yml
#
# Required CI check: every PR touching apps/ or src/ must have Claude agent
# session cost data attached before merge. Accepts both JSON-array and JSONL
# (the poller's native output) so no manual conversion is needed.
#
# Gate logic:
#   1. Check for skip-cost-gate label — if present, skip immediately
#   2. Check if PR touches apps/ or src/ — if not, skip (exit 0)
#   3. Look for artifact agent-session-costs on the PR head SHA (paginated)
#   4. If absent: FAIL with instructions for attaching cost data
#   5. If present: validate schema, post PR comment with cost summary
#
# Auth: OAuth-only. ANTHROPIC_API_KEY must not be set (never added here).
# @cite apps/analytics-dashboard/cost/src/claude-cost-poller.ts  (AgentSessionCost schema)

name: agent-cost-gate

on:
  pull_request:
    # WHY labeled: skip-cost-gate is often applied after the push; without this
    # the label check reads the stale event payload and evaluates to false.
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: agent-cost-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  agent-cost-gate:
    if: github.event.pull_request.draft == false
    name: Agent session cost gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for skip-cost-gate label
        id: label_check
        run: |
          # Bind the GitHub expression to an env var BEFORE using in shell to
          # prevent expression-injection via attacker-controlled label names.
          echo "skipped=$SKIP_GATE" >> "$GITHUB_OUTPUT"
        env:
          SKIP_GATE: ${{ contains(github.event.pull_request.labels.*.name, 'skip-cost-gate') }}

      - name: Skip (skip-cost-gate label present)
        if: steps.label_check.outputs.skipped == 'true'
        run: echo "Cost gate bypassed via skip-cost-gate label (fix/infra-only PR)."

      - name: Check if PR touches code paths
        id: code_paths
        if: steps.label_check.outputs.skipped != 'true'
        run: |
          # Use event-payload SHAs — robust to branch renames and forks.
          CHANGED=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")
          echo "changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(apps|src)/'; then
            echo "touches_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "touches_code=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download agent-session-costs artifact
        id: download_artifact
        if: steps.label_check.outputs.skipped != 'true' && steps.code_paths.outputs.touches_code == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prSha = context.payload.pull_request.head.sha;
            let artifact = null;

            const findArtifact = async () => {
              let page = 1;
              // Paginate so we don't miss the artifact on busy repos (> 100 artifacts)
              while (true) {
                const { data } = await github.rest.actions.listArtifactsForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'agent-session-costs',
                  per_page: 100,
                  page,
                });
                const hit = data.artifacts.find(a =>
                  a.workflow_run?.head_sha === prSha
                );
                if (hit || data.artifacts.length < 100) return hit ?? null;
                page++;
              }
            };

            // agent-session-cost-report runs concurrently on the same PR event;
            // wait for its upload instead of failing on a race.
            for (let attempt = 0; attempt < 9 && !artifact; attempt++) {
              if (attempt > 0) await new Promise(r => setTimeout(r, 20_000));
              artifact = await findArtifact();
            }

            if (!artifact) {
              core.setOutput('found', 'false');
              return;
            }

            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            const fs = require('fs');
            // Uint8Array wrapper handles both ArrayBuffer and Buffer return types
            fs.writeFileSync('/tmp/agent-session-costs.zip', Buffer.from(new Uint8Array(download.data)));
            core.setOutput('found', 'true');

      - name: Unzip artifact
        if: steps.label_check.outputs.skipped != 'true' && steps.code_paths.outputs.touches_code == 'true' && steps.download_artifact.outputs.found == 'true'
        run: |
          # -j flattens directory paths inside the zip; size guard rejects zip-bombs
          unzip -jo /tmp/agent-session-costs.zip -d /tmp/agent-costs/
          SIZE=$(du -sb /tmp/agent-costs/ | cut -f1)
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::error::Extracted artifact exceeds 10 MB — possible zip-bomb or corrupt upload."
            exit 1
          fi

      - name: Validate cost data and generate summary
        id: validate
        if: steps.label_check.outputs.skipped != 'true' && steps.code_paths.outputs.touches_code == 'true'
        run: |
          if [ "$ARTIFACT_FOUND" != "true" ]; then
            echo "::error::No agent-session-costs artifact found for this PR (SHA: $PR_SHA)."
            echo "::error::Attach cost data by running the cost poller during your agent session:"
            echo "::error::  cd apps/analytics-dashboard/cost && npm run poller"
            echo "::error::The poller writes JSONL to /tmp/agent-session-costs.jsonl — upload that file"
            echo "::error::as artifact 'agent-session-costs'. Both JSONL and JSON-array formats accepted."
            echo "::error::For fix/infra-only PRs without agent sessions, apply the 'skip-cost-gate' label."
            exit 1
          fi
          npx tsx scripts/check-agent-costs.ts \
            --artifact-path /tmp/agent-costs/agent-session-costs.json
        env:
          ARTIFACT_FOUND: ${{ steps.download_artifact.outputs.found }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Post cost summary to PR
        if: steps.label_check.outputs.skipped != 'true' && steps.code_paths.outputs.touches_code == 'true' && steps.download_artifact.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '/tmp/agent-costs/agent-session-costs.json';
            if (!fs.existsSync(summaryPath)) return;
            const sessions = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const totalCost = sessions.reduce((sum, s) => sum + (s.cost_usd || 0), 0);
            // Correct schema field names: uncached_input_tokens and output_tokens
            const totalInput = sessions.reduce((sum, s) => sum + (s.uncached_input_tokens || 0), 0);
            const totalOutput = sessions.reduce((sum, s) => sum + (s.output_tokens || 0), 0);
            const rows = sessions.map(s =>
              `| \`${s.session_id}\` | ${s.model} | ${(s.uncached_input_tokens ?? 0).toLocaleString()} | ${(s.output_tokens ?? 0).toLocaleString()} | $${(s.cost_usd ?? 0).toFixed(4)} |`
            ).join('\n');
            const body = [
              `## Agent Session Cost Report`,
              ``,
              `| Session | Model | Uncached In | Tokens Out | Cost |`,
              `|---------|-------|-------------|------------|------|`,
              rows,
              `| **Total** | | **${totalInput.toLocaleString()}** | **${totalOutput.toLocaleString()}** | **$${totalCost.toFixed(4)}** |`,
            ].join('\n');
            // Use pull_request.number explicitly — context.issue.number is a fragile alias
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Skip (no code paths touched)
        if: steps.label_check.outputs.skipped != 'true' && steps.code_paths.outputs.touches_code == 'false'
        run: echo "PR does not touch apps/ or src/ — cost gate skipped."
