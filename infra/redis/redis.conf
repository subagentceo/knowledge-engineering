# Redis 7 — canonical allkeys-lru, 7-day object TTL
# @cite https://redis.io/docs/manual/eviction/

# ── Memory & eviction ─────────────────────────────────────────────────────────
maxmemory 512mb
# allkeys-lru: evict any key using LRU when memory is full (canonical strategy
# for cache-only use — no need for explicit EXPIRE on every key).
maxmemory-policy allkeys-lru
maxmemory-samples 10

# ── Persistence: RDB + AOF for 7-day durability ───────────────────────────────
# RDB snapshots: save every 900s if ≥1 key changed, etc.
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Lazy eviction (non-blocking DEL / FLUSHDB) ────────────────────────────────
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Active key expiry ─────────────────────────────────────────────────────────
# 7 days in seconds = 604800.  Used as the default TTL in src/cache/lru-bm25.ts.
# Redis itself does not enforce a global TTL; callers set EXPIRE 604800.
# This comment is the canonical source for the 7d constant.

# ── Networking ────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
tcp-keepalive 300
timeout 0

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""
