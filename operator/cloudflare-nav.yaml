# cloudflare-nav.yaml
# Stable, version-controlled model of the Cloudflare dashboard left-nav for
# account e6294e3ea89f8207af387d459824aaae (Alex@jadecli.com's Account).
#
# Authored interactively via a Chrome-side Claude agent scraping the live
# dashboard; pinned here so the nav topology is a stable target rather than a
# per-session scrape. Account-scoped paths are prefixed with basePath at
# resolve time; absolute:true items (Zero Trust) skip the prefix.
#
# Previously-dropped dynamic surfaces (Recents, zone-scoped entries) are now
# modeled explicitly under `recents:` and `zones:` so they are stable too.

accountId: e6294e3ea89f8207af387d459824aaae
basePath: /e6294e3ea89f8207af387d459824aaae

sections:
  - id: domains
    label: Domains
    items:
      - { label: Overview,      path: /domains/overview }
      - { label: Registrations, path: /domains/registrations }
      - { label: Transfers,     path: /domains/transfers }

  - id: investigate
    label: Investigate
    group: Observe
    items:
      - { label: Log Explorer,    path: /log-explorer/log-search }
      - { label: Manage datasets, path: /log-explorer/manage-sources }
      - { label: Trace,           path: /trace, badge: beta }
      - { label: Logpush,         path: /logs }

  - id: analytics
    label: Analytics
    items:
      - { label: Dashboards,        path: /dashboards, badge: new }
      - { label: Account analytics, path: /analytics }
      - { label: Web analytics,     path: /web-analytics }

  - id: compute
