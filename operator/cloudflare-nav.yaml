# Previously dropped as "not stable" — now pinned to their resolved section
# paths so the recents rail is reproducible across sessions.
recents:
  - { label: Manage datasets, path: /log-explorer/manage-sources }
  - { label: Log Explorer,    path: /log-explorer/log-search }
  - { label: Log search,      path: /log-explorer/log-search }
  - { label: Dashboards,      path: /dashboards }
  - { label: Analytics,       path: /analytics }
  - { label: Workers Routes,  path: /workers-and-pages }

# Zone-scoped entries (zone paths are keyed by zone name, not the account
# basePath). Modeled explicitly so managedcoworkers.com is a stable target.
zones:
  - zone: managedcoworkers.com
    items:
      - { label: Domains,        path: /domains }
      - { label: Analytics,      path: /analytics }
      - { label: Workers Routes, path: /workers/routes }
